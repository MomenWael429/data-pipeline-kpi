name: CI/CD data pipeline 

on:
  schedule:
    - cron: "0 8 * * *"
jobs: 
  build:
    runs-on: ubuntu-latest
    steps:
        - name: Checkout code
          uses: actions/checkout@v3

        - name: Set up Python
          uses: actions/setup-python@v4
          with:
            python-version: "3.10"

        - name: Install dependencies
          run: | 
            pip install -r requirements.txt
            pip install pytest

        - name: Run unit tests
          run: pytest
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
        - name: Set up Python
          uses: actions/setup-python@v4
          with:
            python-version: "3.10"

        - name: Install dependencies
          run: | 
            pip install -r requirements.txt
            pip install pytest

        - name: Run unit tests
          run: pytest

        - name: Run pipeline
          run: python main.py

  run:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run pipeline
        run: python main.py

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto update data" || echo "No changes"
          git push



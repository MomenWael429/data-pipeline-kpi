name: CI/CD data pipeline

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: pipeline
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: python -m pytest

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: python -m pytest

  run:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run pipeline
        run: python main.py

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          
          # Add files and check for changes
          git add -f data/data.csv data/build_log.csv output/chart.png output/kpis.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          
          git commit -m "Auto update data [skip ci]"
          
          # 1. Fetch latest changes
          # 2. Rebase using 'theirs' strategy (favors the runner's new data during conflicts)
          # 3. Push to main
          git pull --rebase --autostash -X theirs origin main
          git push origin main
